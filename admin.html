<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - سهل للخدمات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: #f4f6fb;
}

/* الشريط الجانبي */
.sidebar {
  width: 240px;
  background: #0A1A2F;
  color: white;
  min-height: 100vh;
  padding: 20px 15px;
  position: fixed;
  right: 0;
  top: 0;
  transition: width 0.3s;
  overflow: hidden;
}

.sidebar.collapsed {
  width: 70px;
}

.sidebar img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 0 auto 10px;
}

.sidebar h3 {
  text-align: center;
  font-size: 16px;
  margin-bottom: 20px;
}

.sidebar a {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  text-decoration: none;
  margin: 12px 0;
  font-size: 16px;
  padding: 8px;
  border-radius: 6px;
  transition: background 0.2s;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.1);
}

.sidebar.collapsed a span {
  display: none;
}

/* المحتوى */
.main {
  margin-right: 260px;
  padding: 20px;
  transition: margin-right 0.3s;
}

.main.collapsed {
  margin-right: 90px;
}

/* الهيدر */
header {
  background: #0A1A2F;
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-radius: 10px;
}

header img {
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}

/* البطاقات */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.card span {
  font-size: 22px;
  color: #F57C00;
  font-weight: 700;
}
</style>
</head>

<body>

<!-- الشريط الجانبي -->
<div class="sidebar" id="sidebar">
  <img src="images/logo.png" alt="سهل للخدمات">
  <h3>سهل للخدمات</h3>

  <a href="admin.html"><i class="fa-solid fa-gauge"></i> <span>لوحة التحكم</span></a>
  <a href="orders.html"><i class="fa-solid fa-list"></i> <span>الطلبات</span></a>
  <a href="services.html"><i class="fa-solid fa-briefcase"></i> <span>الخدمات</span></a>
  <a href="banners.html"><i class="fa-solid fa-image"></i> <span>البنرات</span></a>
  <a href="settings.html"><i class="fa-solid fa-gear"></i> <span>الإعدادات</span></a>
  <a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i> <span>تسجيل الخروج</span></a>
</div>

<!-- المحتوى -->
<div class="main" id="main">

<header>
  <button id="toggleSidebar"><i class="fa-solid fa-bars"></i></button>
  <img src="images/logo.png" alt="logo">
  <span style="font-size:20px;font-weight:700;">لوحة التحكم - سهل للخدمات</span>
</header>

<!-- البطاقات -->
<div class="cards">
  <div class="card">
    <h3>إجمالي الطلبات</h3>
    <span id="totalOrders">0</span>
  </div>

  <div class="card">
    <h3>الطلبات المعلقة</h3>
    <span id="pendingOrders">0</span>
  </div>

  <div class="card">
    <h3>الطلبات المنجزة</h3>
    <span id="doneOrders">0</span>
  </div>
</div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, getDocs, orderBy, query 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCWMTuFTnCl-XerYIt2uT4Hl_WiyQjEO0",
  authDomain: "sahl-services-94183.firebaseapp.com",
  projectId: "sahl-services-94183",
  storageBucket: "sahl-services-94183.firebasestorage.app",
  messagingSenderId: "926677469615",
  appId: "1:926677469615:web:6ba21a1e73752f5271875a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* تحميل الإحصائيات */
async function loadStats() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  let total = 0, pending = 0, done = 0;

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    total++;

    if (data.status === "منجز") done++;
    else pending++;
  });

  document.getElementById("totalOrders").textContent = total;
  document.getElementById("pendingOrders").textContent = pending;
  document.getElementById("doneOrders").textContent = done;
}

loadStats();
</script>

<!-- طي الشريط -->
<script>
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');
document.getElementById('toggleSidebar').onclick = () => {
  sidebar.classList.toggle('collapsed');
  main.classList.toggle('collapsed');
};
</script>

</body>
</html>
